{% set name = "backports.shutil_which" %}
{% set version = "3.5.2" %}
{% set sha256 = "fe39f567cbe4fad89e8ac4dbeb23f87ef80f7fe8e829669d0221ecdb0437c133" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  number: 1
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - backports
  run:
    - python >={{ python_min }}
    - backports

test:
  requires:
    - python {{ python_min }}
  imports:
    - backports
    - backports.shutil_which

about:
  home: https://github.com/minrk/backports.shutil_which
  license: PSF2 & MIT
  license_file: LICENSE
  summary: 'Backport of shutil.which from Python 3.3'

extra:
  recipe-maintainers:
    - kain88-de
    - minrk
